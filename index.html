<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali ❤️ Mira</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000814;
    color: white;
    text-align: center;
    overflow-x: hidden;
    transition: background 0.5s, color 0.5s;
}

/* Romantic theme toggle */
body.romantic {
    background: #ffeef5;
    color: #222;
}

/* Intro */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: linear-gradient(135deg, #000814, #001d3d);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#intro button {
    padding: 14px 32px;
    font-size: 18px;
    background: #ff4f81;
    border: none;
    border-radius: 30px;
    color: white;
    cursor: pointer;
}

/* Stars */
.star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
}

/* Container */
.container {
    margin-top: 60px;
    padding: 20px;
}

.photo {
    width: 320px;
    margin: 30px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.photo img {
    width: 100%;
}

button {
    padding: 10px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    background: #ff4f81;
    color: white;
    margin-top: 15px;
}

input {
    padding: 8px;
    border-radius: 20px;
    border: none;
    text-align: center;
}

/* Envelope */
.envelope {
    width: 200px;
    height: 120px;
    background: #ff4f81;
    margin: 30px auto;
    position: relative;
    cursor: pointer;
    border-radius: 10px;
}

.envelope:before {
    content: "";
    position: absolute;
    top: -60px;
    left: 0;
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 60px solid #ff4f81;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div id="intro">
    <h1>Ali ❤️ Mira</h1>
    <button onclick="enterWorld()">Enter Our World ✨</button>
</div>

<audio id="bgMusic" src="music.mp3" loop></audio>

<div class="container hidden" id="main">

    <h1>Ali ❤️ Mira</h1>

    <div class="photo">
        <img src="us.jpeg">
    </div>

    <p id="typewriter"></p>

    <button onclick="playMusic()">Play Our Song 🎧</button>
    <br>
    <button onclick="toggleTheme()">Switch Theme 🌙</button>

    <h3>
