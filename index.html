<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali ❤️ Mira</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000814;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* Intro Screen */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: linear-gradient(135deg, #000814, #001d3d);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#intro h1 {
    font-size: 50px;
    margin-bottom: 20px;
}

#intro button {
    padding: 14px 32px;
    font-size: 18px;
    background: #ff4f81;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

/* Star Background */
.star {
    position: fixed;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

.container {
    margin-top: 50px;
    padding: 20px;
}

h1 {
    font-size: 42px;
}

h2 {
    font-weight: normal;
    opacity: 0.8;
}

.photo {
    margin: 30px auto;
    width: 320px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

.photo img {
    width: 100%;
    display: block;
}

p {
    font-size: 18px;
    max-width: 650px;
    margin: 20px auto;
    line-height: 1.7;
}

button {
    padding: 12px 28px;
    font-size: 18px;
    background: #ff4f81;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: white;
    color: #ff4f81;
}

footer {
    margin-top: 50px;
    font-size: 16px;
    opacity: 0.7;
}
</style>
</head>

<body>

<!-- Intro Screen -->
<div id="intro">
    <h1>Ali ❤️ Mira</h1>
    <button onclick="enterWorld()">Enter Our World ✨</button>
</div>

<!-- Background Music -->
<audio id="bgMusic" src="music.mp3" loop></audio>

<div class="container" id="mainContent" style="display:none;">

    <h1>Ali ❤️ Mira</h1>
    <h2>I don’t wanna go, but I don’t wanna stay without you.</h2>

    <div class="photo">
        <img src="us.jpeg" alt="Ali and Mira">
    </div>

    <p id="typewriter"></p>

    <footer>
        Made by Ali — For Mira 🌙
    </footer>
</div>

<script>

/* Enter World */
function enterWorld() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    document.getElementById("bgMusic").play();
}

/* Create Stars */
for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.width = star.style.height = Math.random() * 3 + "px";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(star);
}

/* Typewriter Effect */
const message = "Mira, even when we’re apart, you’re still the last thought before I sleep and the first one when I wake up. No matter the distance, my heart always finds its way back to you.";
let i = 0;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("typewriter").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

window.onload = function() {
    typeWriter();
};

</script>

</body>
</html>
